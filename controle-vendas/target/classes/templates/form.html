<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Venda</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%230b1220'/><rect x='24' y='58' width='14' height='22' fill='%2367E8F9'/><rect x='43' y='42' width='14' height='38' fill='%2322D3EE'/><rect x='62' y='28' width='14' height='52' fill='%2306B6D4'/></svg>">
    <style>
        :root{
            --bg:#0b1220; --surface:#141d2e; --surface2:#1b2940; --line:#26324a;
            --ink:#e7edf6; --muted:#8aa0bd; --brand:#22d3ee; --brand2:#06b6d4; --brand-strong:#0891b2;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);min-height:100vh;
            background:radial-gradient(900px circle at 50% -10%, rgba(34,211,238,.12), transparent 55%), var(--bg);}
        .wrap{max-width:560px;margin:0 auto;padding:40px 16px}
        .brand{display:flex;align-items:center;gap:14px;margin-bottom:24px}
        .logo{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,var(--brand),var(--brand-strong));display:flex;align-items:flex-end;justify-content:center;gap:3px;padding:9px}
        .logo i{width:6px;background:#06212a;border-radius:2px;display:block}
        .logo i:nth-child(1){height:40%}.logo i:nth-child(2){height:65%}.logo i:nth-child(3){height:100%}
        .eyebrow{font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--brand);margin-bottom:4px}
        h1{font-weight:800;letter-spacing:-.02em;font-size:26px}
        .card2{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:26px}
        .field{margin-bottom:16px}
        .field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
        .field input{width:100%;background:var(--surface2);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:11px 13px;font:inherit;transition:border-color .15s,box-shadow .15s}
        .field input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(34,211,238,.15)}
        .actions{display:flex;gap:10px;margin-top:22px}
        .b{display:inline-block;padding:11px 20px;border-radius:10px;font-size:15px;font-weight:600;text-decoration:none;border:1px solid transparent;cursor:pointer}
        .btn-cyan{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#06212a;border:none}
        .btn-cyan:hover{filter:brightness(1.08)}
        .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}
        .btn-ghost:hover{color:var(--ink);border-color:var(--muted)}
    </style>
</head>
<body>
    <div class="wrap">
        <div class="brand">
            <div class="logo"><i></i><i></i><i></i></div>
            <div>
                <div class="eyebrow">Painel de Vendas</div>
                <h1>Cadastro de Venda</h1>
            </div>
        </div>

        <div class="card2">
            <form th:action="@{/vendas/salvar}" th:object="${venda}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="field">
                    <label>Data da venda</label>
                    <input type="date" th:field="*{data}" required>
                </div>
                <div class="field">
                    <label>Nome do produto</label>
                    <input type="text" th:field="*{produto}" placeholder="Ex.: Camiseta" required>
                </div>
                <div class="field">
                    <label>Preço unitário (R$)</label>
                    <input type="number" step="0.01" min="0" th:field="*{precoUnitario}" placeholder="0,00" required>
                </div>
                <div class="field">
                    <label>Quantidade vendida</label>
                    <input type="number" min="0" th:field="*{quantidade}" placeholder="0" required>
                </div>

                <div class="actions">
                    <button type="submit" class="b btn-cyan">Salvar</button>
                    <a th:href="@{/vendas}" class="b btn-ghost">Voltar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
